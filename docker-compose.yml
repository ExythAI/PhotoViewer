# PhotoViewer - Docker Compose
# 
# All configuration is read from the .env file.
# See .env.example for available settings.

services:
  photoviewer:
    build: .
    container_name: photoviewer
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - app_data:/data
      - photos_media:/media
    environment:
      - Storage__MediaPath=/media
      - Storage__DatabasePath=/data/photoviewer.db
      - Storage__ThumbnailPath=/data/thumbnails
      - Storage__DownloadPath=/data/downloads
      - Scanner__IntervalMinutes=${SCAN_INTERVAL:-60}
      - Jwt__Key=${JWT_KEY:-PhotoViewerSuperSecretDefaultKey2026}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app_data:
    driver: local
  
  # CIFS mount for network share
  photos_media:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},vers=3.0,uid=1000,gid=1000,file_mode=0755,dir_mode=0755"
      device: "${SMB_SHARE:-//winnfs/FamilyPhotos}"
