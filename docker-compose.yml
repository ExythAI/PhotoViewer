# PhotoViewer - Docker Compose
# 
# Mount your network share on the host first:
#   sudo mount -t cifs //192.168.0.252/FamilyPhotos /mnt/FamilyPhotos -o username=USER,password=PASS,vers=3.0,uid=1000,gid=1000
#
# Then run: docker compose up -d --build

services:
  photoviewer:
    build: .
    container_name: photoviewer
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - app_data:/data
      - /mnt/FamilyPhotos:/media:ro
    environment:
      - Storage__MediaPath=/media
      - Storage__DatabasePath=/data/photoviewer.db
      - Storage__ThumbnailPath=/data/thumbnails
      - Storage__DownloadPath=/data/downloads
      - Scanner__IntervalMinutes=${SCAN_INTERVAL:-60}
      - Jwt__Key=${JWT_KEY:?JWT_KEY must be set in .env file}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app_data:
    driver: local
